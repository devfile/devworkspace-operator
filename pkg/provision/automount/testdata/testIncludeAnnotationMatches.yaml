name: Provisions configmap, secret, and PVC when include annotation matches workspace name

input:
  configmaps:
    -
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: targeted-configmap
        labels:
          controller.devfile.io/mount-to-devworkspace: "true"
          controller.devfile.io/watch-configmap: 'true'
        annotations:
          controller.devfile.io/mount-as: file
          controller.devfile.io/mount-path: /tmp/targeted
          controller.devfile.io/mount-to-devworkspace-include: "test-workspace, other-ws"
      data:
        config-key: "config-value"
  secrets:
    -
      apiVersion: v1
      kind: Secret
      metadata:
        name: targeted-secret
        labels:
          controller.devfile.io/mount-to-devworkspace: "true"
          controller.devfile.io/watch-secret: 'true'
        annotations:
          controller.devfile.io/mount-as: file
          controller.devfile.io/mount-path: /tmp/targeted-secret
          controller.devfile.io/mount-to-devworkspace-include: "test-workspace, other-ws"
      stringData:
        secret-key: "secret-value"
  pvcs:
    -
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: targeted-pvc
        labels:
          controller.devfile.io/mount-to-devworkspace: "true"
        annotations:
          controller.devfile.io/mount-path: /tmp/targeted-pvc
          controller.devfile.io/mount-to-devworkspace-include: "test-workspace, other-ws"
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi

output:
  volumes:
  - name: targeted-configmap
    configmap:
      name: targeted-configmap
      defaultMode: 0640
  - name: targeted-secret
    secret:
      secretName: targeted-secret
      defaultMode: 0640
  - name: targeted-pvc
    persistentVolumeClaim:
      claimName: targeted-pvc
  volumeMounts:
  - name: targeted-configmap
    readOnly: true
    mountPath: /tmp/targeted
  - name: targeted-secret
    readOnly: true
    mountPath: /tmp/targeted-secret
  - name: targeted-pvc
    mountPath: /tmp/targeted-pvc
