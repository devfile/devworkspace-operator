name: Provisions configmap, secret, and PVC when exclude annotation does not match workspace name

input:
  configmaps:
    -
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: not-excluded-configmap
        labels:
          controller.devfile.io/mount-to-devworkspace: "true"
          controller.devfile.io/watch-configmap: 'true'
        annotations:
          controller.devfile.io/mount-as: file
          controller.devfile.io/mount-path: /tmp/not-excluded-cm
          controller.devfile.io/mount-to-devworkspace-exclude: "staging-*, prod-*"
      data:
        config-key: "config-value"
  secrets:
    -
      apiVersion: v1
      kind: Secret
      metadata:
        name: not-excluded-secret
        labels:
          controller.devfile.io/mount-to-devworkspace: "true"
          controller.devfile.io/watch-secret: 'true'
        annotations:
          controller.devfile.io/mount-as: file
          controller.devfile.io/mount-path: /tmp/not-excluded
          controller.devfile.io/mount-to-devworkspace-exclude: "staging-*, prod-*"
      stringData:
        secret-key: "secret-value"
  pvcs:
    -
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: not-excluded-pvc
        labels:
          controller.devfile.io/mount-to-devworkspace: "true"
        annotations:
          controller.devfile.io/mount-path: /tmp/not-excluded-pvc
          controller.devfile.io/mount-to-devworkspace-exclude: "staging-*, prod-*"
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi

output:
  volumes:
  - name: not-excluded-configmap
    configmap:
      name: not-excluded-configmap
      defaultMode: 0640
  - name: not-excluded-secret
    secret:
      secretName: not-excluded-secret
      defaultMode: 0640
  - name: not-excluded-pvc
    persistentVolumeClaim:
      claimName: not-excluded-pvc
  volumeMounts:
  - name: not-excluded-configmap
    readOnly: true
    mountPath: /tmp/not-excluded-cm
  - name: not-excluded-secret
    readOnly: true
    mountPath: /tmp/not-excluded
  - name: not-excluded-pvc
    mountPath: /tmp/not-excluded-pvc
